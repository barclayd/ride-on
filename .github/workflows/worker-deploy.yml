name: worker-deploy

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"

concurrency:
  group: worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Smoke-test the artifact that just shipped — real Valhalla, real Strava error path.
      - run: bun test test/smoke.test.ts
        env:
          WORKER_URL: https://ride-on-api.barclaysd.workers.dev
