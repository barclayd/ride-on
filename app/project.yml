name: RideOn
options:
  bundleIdPrefix: com.danbarclay
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"

configs:
  Debug: debug
  Release: release

packages:
  RideOnCore:
    path: RideOnCore

targets:
  RideOn:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: RideOn
    dependencies:
      - package: RideOnCore
    # GENERATE_INFOPLIST_FILE only supports flat string/bool keys via
    # INFOPLIST_KEY_* — the GPX document-type declarations below are arrays
    # of dicts, so XcodeGen generates a real Info.plist from `properties`
    # instead. Output path is outside `sources: RideOn` so it isn't also
    # swept in as a resource.
    info:
      path: Generated/RideOn-Info.plist
      properties:
        # Declares a (blank) launch screen so iOS renders the app at native
        # resolution — without this key the app runs letterboxed in
        # compatibility mode.
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Ride On uses your location to find rides near you and estimate travel time."
        NSHealthShareUsageDescription: "Ride On reads your cycling workouts to match them to your saved routes and log rides automatically."
        NSHealthUpdateUsageDescription: "Ride On may save ride data it records back to Health."
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.topografix.gpx
            UTTypeDescription: "GPX Route"
            UTTypeConformsTo: [public.xml]
            UTTypeTagSpecification:
              public.filename-extension: [gpx]
        CFBundleDocumentTypes:
          - CFBundleTypeName: "GPX Route"
            LSItemContentTypes: [com.topografix.gpx]
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danbarclay.rideon
        PRODUCT_NAME: RideOn
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # No real Apple Developer team configured yet — automatic signing with
        # no team + no entitlements attached in Debug lets simulator builds
        # succeed. Entitlements (iCloud/WeatherKit/HealthKit) only attach in
        # Release, once a real team + App ID with those capabilities exists.
        # See CLAUDE.md "Signing" section.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]: RideOn/RideOn-iOS.entitlements
          CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]: RideOn/RideOn-iOS.entitlements
          CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: RideOn/RideOn-macOS.entitlements

  RideOnTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: RideOnTests
    dependencies:
      - target: RideOn
      - package: RideOnCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""

  RideOnUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, macOS]
    sources:
      - path: RideOnUITests
    dependencies:
      - target: RideOn
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""

schemes:
  RideOn:
    build:
      targets:
        RideOn: all
        RideOnTests: [test]
        RideOnUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: RideOn.xctestplan
          defaultPlan: true
    archive:
      config: Release
